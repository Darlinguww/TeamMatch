server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────
    # React Router — redirige todo al index.html
    # Sin esto, recargar la página en /projects
    # devuelve 404 porque Nginx busca un archivo
    # físico que no existe.
    # ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────
    # Proxy hacia el backend
    # Las peticiones a /api se redirigen al backend
    # sin que el navegador vea la URL interna
    # ─────────────────────────────────────────────
    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─────────────────────────────────────────────
    # Archivos estáticos — caché agresivo
    # Los archivos JS/CSS de Vite tienen hash en el
    # nombre, así que es seguro cachearlos 1 año
    # ─────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}